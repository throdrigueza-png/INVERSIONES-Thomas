name: Build and deploy Node.js app to Azure Web App - inversiones-thomas-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Instalar, Generar Prisma y Construir Next.js
        run: |
          cd frontend
          npm install
          npx prisma generate
          npm run build
          npm prune --production

      - name: Comprimir la App en un ZIP (Protege los permisos y symlinks)
        run: |
          cd frontend
          zip -y -q -r ../release.zip .

      - name: Subir artefacto ZIP
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Desplegar ZIP en Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'inversiones-thomas-app'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
