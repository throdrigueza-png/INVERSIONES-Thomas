name: Build and deploy Node.js app to Azure Web App - inversiones-thomas-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Crear archivo .env para producción
        run: |
          cd frontend
          echo "GOOGLE_CLIENT_ID=181911766292-44ukekovbp51mgmqck12diups9mavunk.apps.googleusercontent.com" > .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
          echo "NEXTAUTH_URL=https://portal-de-finanzas-thomas-d8frdfa8f7hvdhff.westus3-01.azurewebsites.net" >> .env

      - name: Instalar, Generar Prisma y Construir Next.js
        run: |
          cd frontend
          npm install
          npx prisma generate
          npm run build
          npm prune --production

      - name: Comprimir la App en un ZIP (Protege los permisos y symlinks)
        run: |
          cd frontend
          zip -y -q -r ../release.zip .

      - name: Subir artefacto ZIP
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Desplegar ZIP en Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'portal-de-finanzas-thomas'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
